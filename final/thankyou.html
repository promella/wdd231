<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Thank You</title>
<link rel="icon" href="images/favicon.ico">

<link rel="stylesheet"
href="styles/base.css">

<script type="module" src="scripts/home.js"></script>

document.addEventListener(
"DOMContentLoaded", () => {

const params =
new URLSearchParams(
window.location.search
);

document.querySelector("#name")
.textContent =
params.get("name");

});

</script>

</head>

<body>

<main>

<h1>Thank You!</h1>

<p>
Thank you
<span id="name"></span>
for contacting us.
</p>

</main>

</body>
</html>
