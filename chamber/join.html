<meta name="description" content="Join the Johannesburg Chamber of Commerce to access networking events, business support, training, and growth opportunities.">

<!-- Open Graph -->
<meta property="og:title" content="Join Johannesburg Chamber of Commerce Membership">
<meta property="og:description" content="Apply for membership and unlock networking, business growth, and exclusive chamber opportunities in Johannesburg.">
<meta property="og:image" content="https://promella.github.io/wdd231/chamber/images/johannesburg.skyline.2017.jpg">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

<!-- Favicon -->
<link rel="icon" href="images/favicon.ico">

<link rel="stylesheet" href="styles/small.css">
<link rel="stylesheet" href="styles/larger.css">

<script src="scripts/join.js" defer></script>

<body>

<header>
    <div class="logo">
        <img src="images/logo.webp" alt="Chamber Logo">
        <span>Chamber of Commerce</span>
    </div>

    <button id="menu" aria-label="Open navigation menu"></button>

    <nav class="navigation">
        <a href="index.html">Home</a>
        <a href="directory.html">Directory</a>
        <a href="join.html" class="active">Join</a>
        <a href="thankyou.html">Thank you</a>
        <a href="discover.html">Discover</a>
    </nav>
</header>

<main>

<h1>Join The Johannesburg Chamber of Commerce</h1>

<div class="join-container">

    <section class="application-form">
        <h2>Membership Application Form</h2>

        <form method="get" action="thankyou.html">

            <label>
                First Name
                <input type="text" name="fname" autocomplete="given-name" required>
            </label>

            <label>
                Last Name
                <input type="text" name="lname" autocomplete="family-name" required>
            </label>

            
            <label for="organization">Organization Title</label>
            <input
                type="text"
                id="organization"
                name="organization"
                required
                pattern="^[A-Za-z0-9\s\-&.,]{3,100}$"
                title="3–100 characters: letters, numbers, spaces, and basic punctuation only"
            />

            <label>
                Email Address
                <input type="email" name="email" autocomplete="email" required>
            </label>

            <label>
                Mobile Phone
                <input type="tel" name="phone" autocomplete="tel" required>
            </label>

            <label>
                Organization Name
                <input type="text" name="organization" autocomplete="organization" required>
            </label>

            <label>
                Membership Level
                <select name="membership">
                    <option value="np">NP</option>
                    <option value="bronze">Bronze</option>
                    <option value="silver">Silver</option>
                    <option value="gold">Gold</option>
                </select>
            </label>

            <label>
                Organization Description
                <textarea name="description"></textarea>
            </label>

            <input type="hidden" id="timestamp" name="timestamp">

            <input type="submit" value="Apply for Membership">

        </form>
    </section>

</div>

</main>

<footer>
<p>&copy; 2026 Johannesburg Chamber of Commerce</p>

<p>Johannesburg, South Africa</p>
</footer>

</body>
</html>
